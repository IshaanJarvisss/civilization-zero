<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civilization Zero: Anthropological Matrix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="simulation-container">
        <canvas id="simCanvas"></canvas>
        <div id="ui-panel">
            <h2>CIVILIZATION ZERO</h2>
            <div class="subtitle">Real-Life Anthropological Simulation</div>
            <hr>
            <p><strong>Timeline:</strong> Day <span id="stat-day">0</span></p>
            <p><strong>Global Population:</strong> <span id="stat-pop">4</span></p>
            <p><strong>Active Civilizations:</strong> <span id="stat-tribes">4</span></p>
            <p><strong>Wildlife Count:</strong> <span id="stat-animals">0</span></p>
            <p><strong>Status:</strong> <span id="stat-status" style="color: #00ffcc;">HISTORY UNFOLDING</span></p>
            <hr>
            <h3>HISTORICAL CHRONICLES</h3>
            <div id="log-box"></div>
        </div>
    </div>
    <script src="simulation.js"></script>
</body>
</html>
